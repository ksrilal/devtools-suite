<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTools Suite</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon16.png" alt="" width="16" height="16" />
    <span class="brand">DevTools Suite</span>
    <a href="https://devtoolssuite.dev" target="_blank" class="open-tab" title="Open in new tab">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
  </header>

  <nav>
    <button class="tab active" data-path="/">Home</button>
    <button class="tab" data-path="/checklist">Checklist</button>
    <button class="tab" data-path="/json-formatter">JSON</button>
    <button class="tab" data-path="/cron-generator">Cron</button>
    <button class="tab" data-path="/diff-checker">Diff</button>
    <button class="tab" data-path="/jwt-decoder">JWT</button>
    <button class="tab" data-path="/regex-tester">Regex</button>
  </nav>

  <div class="frame-wrap">
    <iframe id="tool-frame" src="https://devtoolssuite.dev/" allow="clipboard-write"></iframe>
  </div>

  <script src="popup.js"></script>
</body>
</html>
